version: '3.8'

services:
 # MinIO - Object Storage para camadas de dados
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      AMBIENTE: docker
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Console Web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # PostgreSQL para Airflow metadata
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      AMBIENTE: docker
    volumes:
      - postgres_db_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow Webserver
  airflow-webserver:
    build:
      context: ..
      dockerfile: MLOps/Dockerfile.airflow
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver"
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'your-secret-key-change-in-production'
  # MinIO config para Airflow
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      AMBIENTE: docker
    volumes:
      - ../MLOps/dags:/opt/airflow/dags
      - ../MLOps/logs:/opt/airflow/logs
      - ../MLOps/plugins:/opt/airflow/plugins
      - ../DataPipeline:/opt/airflow/DataPipeline
      - ../Model:/opt/airflow/Model
      - ../Dados:/opt/airflow/Dados
      - ../streaming_pipeline:/opt/airflow/streaming_pipeline
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
    restart: on-failure

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: ..
      dockerfile: MLOps/Dockerfile.airflow
    command: scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      AMBIENTE: docker
    volumes:
      - ../MLOps/dags:/opt/airflow/dags
      - ../MLOps/logs:/opt/airflow/logs
      - ../MLOps/plugins:/opt/airflow/plugins
      - ../DataPipeline:/opt/airflow/DataPipeline
      - ../Model:/opt/airflow/Model
      - ../Dados:/opt/airflow/Dados
      - ../streaming_pipeline:/opt/airflow/streaming_pipeline
    depends_on:
      - postgres
      - minio
    restart: on-failure

  # Streamlit App - Dashboard de Predições
  fraud-app:
    build:
      context: ../app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ../Model:/app/Model:ro
      - ../app:/app
      - ../Dados:/app/Dados:ro
      - ../DataPipeline:/app/DataPipeline:ro
      - ../streaming_pipeline:/app/streaming_pipeline:ro
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - AMBIENTE=docker
    restart: on-failure

volumes:
  postgres_db_volume:
  minio_data: